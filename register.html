<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telpha Vastra Register</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&family=Montserrat&display=swap" rel="stylesheet">
</head>

<body>

<!-- BACKGROUND -->
<div class="bg-shapes">
  <span></span><span></span><span></span>
</div>

<!-- CARD -->
<div class="card">

  <!-- FORM -->
  <div class="form-section">
    <h1>Start Your Style Journey!</h1>

    <!-- STEP 1: REGISTER -->
    <form id="registerForm">

      <input type="text" id="name" placeholder="Full Name" required>

      <input type="email" id="email" placeholder="Email" required>

      <div class="phone-box">
        <select id="code">
          <option value="+91">+91</option>
          <option value="+1">+1</option>
          <option value="+44">+44</option>
        </select>
        <input type="tel" id="phone" placeholder="Phone Number" required>
      </div>

      <select id="country" required>
        <option value="">Select Country</option>
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
        <option>Canada</option>
      </select>

      <input type="date" id="dob" required>

      <div class="password-box">
        <input type="password" id="password" placeholder="Password" required>
        <span onclick="togglePassword()">👁️</span>
      </div>

      <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

      <button type="submit" class="primary-btn">Register</button>

    </form>

    <!-- STEP 2: OTP -->
    <div id="otpSection" style="display:none; margin-top:20px;">

      <h2>Verify Your Phone 🔐</h2>

      <div id="recaptcha-container"></div>

      <button class="primary-btn" onclick="sendOTP()">Send OTP</button>

      <input type="text" id="otp" placeholder="Enter OTP">

      <button class="primary-btn" onclick="verifyOTP()">Verify OTP</button>

    </div>

    <div class="divider">or</div>

    <button class="social google">Sign up with Google</button>
    <button class="social facebook">Sign up with Facebook</button>

    <p>Already have account? <a href="login.html">Login</a></p>

  </div>

  <!-- IMAGE -->
  <div class="visual-section">
    <img src="marcus-loke-xXJ6utyoSw0-unsplash.jpg" class="visual-img">

    <div class="overlay-text">
      <h2>Telpha Vastra</h2>
      <p>Luxury Textile Experience</p>
    </div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="script.js"></script>

</body>
</html>

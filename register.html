<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreadAura Register</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&family=Montserrat&display=swap" rel="stylesheet">
</head>

<body>

<!-- Background Blobs -->
<div class="bg-shapes">
  <span></span>
  <span></span>
  <span></span>
</div>

<!-- CARD -->
<div class="card">

  <!-- LEFT FORM -->
  <div class="form-section">
    <h1>Create Account</h1>

    <form>

      <input type="text" placeholder="Full Name" required>

      <input type="email" placeholder="Email" required>

      <!-- PHONE -->
      <div class="phone-box">
        <select>
          <option>+91</option>
          <option>+1</option>
          <option>+44</option>
        </select>
        <input type="tel" placeholder="Phone Number" required>
      </div>

      <!-- COUNTRY -->
      <select required>
        <option>Select Country</option>
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
        <option>Canada</option>
      </select>

      <!-- DOB -->
      <input type="date" required>

      <!-- PASSWORD -->
      <div class="password-box">
        <input type="password" placeholder="Password" required>
        <span>👁️</span>
      </div>

      <input type="password" placeholder="Confirm Password" required>

      <button class="primary-btn">Register</button>

    </form>

    <div class="divider">or</div>

    <button class="social google">Sign up with Google</button>
    <button class="social facebook">Sign up with Facebook</button>

    <p>Already have account? <a href="login.html">Login</a></p>
  </div>

  <!-- RIGHT IMAGE -->
  <div class="visual-section">
    <img src="hector-j-rivas-Nh6NsnqYVsI-unsplash.jpg" class="visual-img">

    <div class="overlay-text">
      <h2>ThreadAura</h2>
      <p>Luxury Textile Experience</p>
    </div>
  </div>

</div>

</body>
</html>
